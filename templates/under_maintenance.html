{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Under Maintenance - ShopEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandPink: '#bd2a67ff',
            brandCoral: '#ff5c39',
            brandDark: '#2f2f2f',
            brandMuted: '#5e5d5dff',
            brandLight: '#fdfdfd',
            beige: '#dbbe9c'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .spinner {
      border: 4px solid rgba(189, 42, 103, 0.2);
      border-top: 4px solid #bd2a67ff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="bg-beige text-brandDark min-h-screen flex flex-col">

  <!-- Header -->
  <header class="py-4 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <a href="/">
        <img src="{% static 'images/logo1.png' %}" alt="ShopEase Logo"
             class="sm:h-14 md:h-20 w-35" />
      </a>
      <nav class="flex space-x-4">
        <a href="/" class="bg-brandPink hover:bg-pink-700 text-white px-4 py-2 rounded-full font-medium transition">Home</a>
      </nav>
    </div>
  </header>

  <!-- Under Maintenance Content -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center max-w-md">
      <!-- Loading Spinner -->
      <div class="spinner mx-auto mb-8"></div>

      <!-- Coming Soon Heading -->
      <h1 class="text-4xl md:text-5xl font-bold text-brandDark mb-4">Coming Soon</h1>

      <!-- Description -->
      <p class="text-lg text-brandMuted mb-8">
        This category is currently under maintenance. We're working to bring it back soon.
      </p>

      <!-- Back to Home Button -->
      <a href="/" class="bg-brandCoral text-white px-8 py-3 rounded-full text-lg hover:bg-orange-500 transition inline-block">
        ← Back to Home
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-beige py-6 border-t mt-12">
    <div class="w-full px-10 text-center text-sm text-brandMuted">
      &copy; 2025 <strong class="text-brandDark">ShopEase</strong>. All rights reserved. | Built by <span class="text-brandCoral font-semibold">MR Technologies</span>
    </div>
  </footer>

</body>
</html>
